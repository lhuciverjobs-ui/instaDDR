kind = "web"
previewPath = "/"
title = "Temp Mail (kuku.lu scraper)"
version = "1.0.0"
id = "artifacts/tempmail"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18652

[services.development]
run = "pnpm --filter @workspace/tempmail run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tempmail", "run", "build" ]
publicDir = "artifacts/tempmail/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18652"
BASE_PATH = "/"
